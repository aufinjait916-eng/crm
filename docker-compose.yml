services:
  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-field-dynamics
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/db.json
      # If you're using admin or customized credentials in your environment
      # - ADMIN_PASSWORD=your_secure_password
    volumes:
      # Keep local state persistent across container restarts
      - ./data:/app/data
      - ./uploads:/app/uploads
